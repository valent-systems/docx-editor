<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>docx-editor — Vite Example</title>

  <!-- Icons + manifest mirror the docx-editor.dev marketing site so
       the demo, PWA install, and og share image all use the same
       artwork. Source: ~/docx-editor-page/src/app + public/. -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/web-app-manifest-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/web-app-manifest-512x512.png">
  <link rel="canonical" href="https://docx-editor.dev/">

  <meta property="og:title" content="DOCX Editor — Open-source DOCX editor for the browser">
  <meta property="og:description" content="WYSIWYG DOCX editor in the browser. Tables, images, tracked changes, comments. No server required. MIT.">
  <meta property="og:url" content="https://docx-editor.dev/">
  <meta property="og:image" content="/og/docx-icon.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="/og/docx-icon.png">

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Load Material Symbols font early with display=block to prevent FOUT -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }
    #app {
      width: 100%;
      min-height: 100vh;
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #94a3b8;
      gap: 16px;
      font-size: 14px;
    }
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Hide Material Symbols text until font loads */
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      visibility: hidden;
    }

    /* Show icons once font is loaded */
    .fonts-loaded .material-symbols-outlined {
      visibility: visible;
    }
  </style>

  <script>
    // Detect when Material Symbols font is loaded
    if (document.fonts) {
      document.fonts.ready.then(function() {
        document.documentElement.classList.add('fonts-loaded');
      });
      document.fonts.load('24px "Material Symbols Outlined"').then(function() {
        document.documentElement.classList.add('fonts-loaded');
      });
    } else {
      setTimeout(function() {
        document.documentElement.classList.add('fonts-loaded');
      }, 500);
    }
  </script>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="loading-spinner"></div>
      <span>Loading editor...</span>
    </div>
  </div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
